<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Drex Futebol - Monitor</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; }
        .jogo-card { 
            background: #1e1e1e; border-left: 5px solid #00ff00; 
            margin-bottom: 10px; padding: 15px; border-radius: 4px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .tempo { color: #00ff00; font-weight: bold; min-width: 60px; }
        .times { flex-grow: 1; margin-left: 20px; font-size: 1.1em; display: flex; flex-direction: column; gap: 8px; }
        .time-row { display: flex; align-items: center; gap: 10px; }
        .placar { font-weight: bold; margin-left: auto; padding-right: 20px; color: #fff; font-size: 1.2em; }
        .escudo { width: 24px; height: 24px; object-fit: contain; }
        .acrescimos { text-align: right; color: #aaa; font-size: 0.9em; display: flex; flex-direction: column; align-items: flex-end; }
        .gol-v { color: #fff; font-weight: bold; font-size: 1.2em; }
        .info-acrescimo { margin-right: 30px; }
        .acrescimos span { color: #fff; font-weight: bold; }
        .cartao-vermelho { background: #ff4d4d; color: white; padding: 0 5px; border-radius: 2px; font-weight: bold; font-size: 0.7em; margin-left: 5px; display: inline-block; line-height: 1.4; }
        .last-update { font-size: 0.7em; color: #555; display: block; }
        #btn-notificacao { background: #e67e22; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-size: 0.9em; margin-bottom: 15px; width: 100%; }
        #btn-notificacao:hover { background: #d35400; }
        #btn-notificacao.ativo { background: #27ae60; cursor: default; }
    </style>
</head>
<body>
    <h1>Drex Futebol - Monitor</h1>
    <button id="btn-notificacao">🔔 Ativar Alertas no Navegador</button>
    <div id="status" style="font-size: 0.8em; color: #666; margin-bottom: 10px;">
        <span id="status-text" style="cursor: pointer;" onclick="location.reload()">Conectando ao servidor...</span>
        <span id="global-last-update" style="margin-left: 10px; color: #aaa;"></span>
    </div>
    <div id="lista-jogos"></div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js"></script>

    <script>
        // ============================================================
        // CONFIGURAÇÃO DO FIREBASE
        // ============================================================
        const firebaseConfig = {
  apiKey: "AIzaSyBihZBPsJwoQq4kvaLub8FgtCcw3n17Ab0",
  authDomain: "radar-26442.firebaseapp.com",
  projectId: "radar-26442",
  storageBucket: "radar-26442.firebasestorage.app",
  messagingSenderId: "48487444611",
  appId: "1:48487444611:web:afd1767ee32f0e6cf06bb6",
};

        firebase.initializeApp(firebaseConfig);
        const messaging = firebase.messaging();

        // ============================================================
        // REGISTRO DO SERVICE WORKER
        // ============================================================
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/firebase-messaging-sw.js')
                .then(reg => console.log('✅ Service Worker registrado:', reg.scope))
                .catch(err => console.error('❌ Falha no Service Worker:', err));
        }

        // ============================================================
        // ENVIAR TOKEN PARA O SERVIDOR (rota corrigida: /register-token)
        // ============================================================
        function sendTokenToServer(token) {
            fetch('https://radar-qvhc.onrender.com/register-token', { // ✅ CORRIGIDO
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: token }),
            })
            .then(res => res.json())
            .then(data => {
                console.log('✅ Token enviado ao servidor:', data);
                const btn = document.getElementById('btn-notificacao');
                btn.textContent = '✅ Alertas Ativados!';
                btn.classList.add('ativo');
                btn.disabled = true;
            })
            .catch(err => console.error('❌ Erro ao enviar token:', err));
        }

        // ============================================================
        // SOLICITAR PERMISSÃO E OBTER TOKEN FCM
        // ============================================================
        function requestPermissionAndGetToken() {
            Notification.requestPermission().then((permission) => {
                if (permission === 'granted') {
                    console.log('✅ Permissão de notificação concedida.');

                    navigator.serviceWorker.ready.then((registration) => {
                        messaging.getToken({
                            vapidKey: 'BFGnv_kFP-Kb4glPGX2xBDORI9lvxbMDhGI80iWXgKCOudT6VwZrAH8SYJBZWzhXQGO974yRS5FEKho_3-mQIBc',
                            serviceWorkerRegistration: registration
                        }).then((currentToken) => {
                            if (currentToken) {
                                console.log('🔑 Token FCM obtido:', currentToken);
                                sendTokenToServer(currentToken);
                            } else {
                                console.warn('⚠️ Nenhum token disponível. Permissão necessária.');
                            }
                        }).catch(err => console.error('❌ Erro ao obter token:', err));
                    });

                } else {
                    console.warn('⚠️ Permissão de notificação negada.');
                    alert('Você negou as notificações. Para ativar, clique no cadeado na barra de endereço.');
                }
            });
        }

        // ============================================================
        // NOTIFICAÇÕES EM PRIMEIRO PLANO (página aberta)
        // ============================================================
        messaging.onMessage((payload) => {
            console.log('📩 Mensagem em primeiro plano:', payload);
            if (Notification.permission === 'granted') {
                new Notification(payload.notification.title, {
                    body: payload.notification.body,
                    icon: payload.notification.icon || 'https://www.radarfutebol.com/favicon.ico'
                });
            }
        });

        // ============================================================
        // BOTÃO DE NOTIFICAÇÃO
        // ============================================================
        const btnNotif = document.getElementById('btn-notificacao');

        if (Notification.permission === 'granted') {
            // Já tem permissão: só precisa registrar o token (silenciosamente)
            navigator.serviceWorker.ready.then((registration) => {
                messaging.getToken({
                    vapidKey: 'BFGnv_kFP-Kb4glPGX2xBDORI9lvxbMDhGI80iWXgKCOudT6VwZrAH8SYJBZWzhXQGO974yRS5FEKho_3-mQIBc',
                    serviceWorkerRegistration: registration
                }).then((token) => {
                    if (token) sendTokenToServer(token);
                });
            });
        } else {
            // Ainda sem permissão: mostra o botão
            btnNotif.style.display = 'block';
            btnNotif.onclick = requestPermissionAndGetToken;
        }
    </script>

    <!-- ============================================================
         SSE — DADOS EM TEMPO REAL DO SERVIDOR
    ============================================================ -->
    <script>
        const lista = document.getElementById('lista-jogos');
        const statusText = document.getElementById('status-text');
        const globalLastUpdate = document.getElementById('global-last-update');
        const eventSource = new EventSource('https://radar-qvhc.onrender.com/events');

        eventSource.onopen = () => {
            statusText.innerText = "Conectado. Aguardando dados do servidor...";
            statusText.style.color = "#00ff00";
        };

        eventSource.onmessage = (event) => {
            const data = JSON.parse(event.data);

            statusText.innerText = "Monitorando em tempo real";
            statusText.style.color = "#00ff00";

            // Instrução para remover card
            if (data.idRemover) {
                const cardParaRemover = document.getElementById(data.idRemover);
                if (cardParaRemover) cardParaRemover.remove();
                return;
            }

            const jogo = data;
            globalLastUpdate.innerText = `| Atualizado às: ${jogo.atualizadoEm}`;

            const idJogo = jogo.idJogo || `${jogo.timeCasa}-${jogo.timeFora}`.replace(/\s+/g, '');

            let card = document.getElementById(idJogo);
            if (!card) {
                card = document.createElement('div');
                card.id = idJogo;
                card.className = 'jogo-card';
                lista.prepend(card);
            }

            card.innerHTML = `
                <div class="tempo">${jogo.status}${isNaN(parseInt(jogo.status)) ? '' : "'"}</div>
                <div class="times">
                    <div class="time-row">
                        <img class="escudo" src="https://www.radarfutebol.com/images/times/${jogo.idTimeCasa}.webp" onerror="this.style.visibility='hidden'">
                        <span>${jogo.timeCasa}</span>
                        ${jogo.vermelhoCasa > 0 ? `<span class="cartao-vermelho">${jogo.vermelhoCasa}</span>` : ''}
                    </div>
                    <div class="time-row">
                        <img class="escudo" src="https://www.radarfutebol.com/images/times/${jogo.idTimeFora}.webp" onerror="this.style.visibility='hidden'">
                        <span>${jogo.timeFora}</span>
                        ${jogo.vermelhoFora > 0 ? `<span class="cartao-vermelho">${jogo.vermelhoFora}</span>` : ''}
                    </div>
                </div>
                <div class="acrescimos">
                    <div class="gol-v">${jogo.golCasa}</div>
                    <div class="info-acrescimo">HT: <span>${jogo.acrescimoHT}</span> | FT: <span>${jogo.acrescimoFT}</span></div>
                    <div class="gol-v">${jogo.golFora}</div>
                </div>
            `;
        };

        eventSource.onerror = () => {
            statusText.innerText = "Conexão perdida. Tentando reconectar automaticamente...";
            statusText.style.color = "#ff4d4d";
        };

        // Aviso se não aparecer nenhum jogo em 10s
        setTimeout(() => {
            if (lista.children.length === 0) {
                statusText.innerText = "Conectado. Nenhum jogo importante encontrado no momento.";
                statusText.style.color = "#aaa";
            }
        }, 10000);

        // Recarrega se a conexão SSE fechar por muito tempo
        setInterval(() => {
            if (eventSource.readyState === EventSource.CLOSED) {
                console.log("Conexão SSE encerrada. Recarregando...");
                location.reload();
            }
        }, 30000);
    </script>
</body>
</html>
